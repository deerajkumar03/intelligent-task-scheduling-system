services:
  - type: web
    name: intelligent-task-scheduler-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run start:production
    plan: free
    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production

      - key: MONGO_URI
        sync: false

      - key: REDIS_HOST
        sync: false

      - key: REDIS_PORT
        sync: false

      - key: REDIS_PASSWORD
        sync: false

      - key: REDIS_TLS
        value: "true"

      - key: CLIENT_URL
        sync: false

      - key: SERVER_URL
        sync: false

      - key: MAX_ACTIVE_JOBS
        value: "3"

      - key: MAX_DYNAMIC_WORKERS
        value: "4"

      - key: DYNAMIC_WORKER_QUEUE_THRESHOLD
        value: "8"

      - key: DYNAMIC_WORKER_IDLE_TIMEOUT
        value: "120000"

      - key: DYNAMIC_WORKER_SPAWN_COOLDOWN
        value: "10000"

      - key: ENABLE_FAILURE_SIMULATION
        value: "false"

      - key: FAILURE_RATE
        value: "0.15"

  - type: web
    name: intelligent-task-scheduler-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./build

    envVars:
      - key: REACT_APP_API_URL
        sync: false

      - key: REACT_APP_SOCKET_URL
        sync: false
